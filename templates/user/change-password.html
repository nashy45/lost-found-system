{% extends "user/base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="welcome-section">
    <h1>Change Password</h1>
    <p>Update your account password</p>
</div>

<div class="dashboard-panel" style="max-width: 560px;">
    <form method="POST" action="{{ url_for('user_change_password') }}" style="display:flex;flex-direction:column;gap:20px;">
        <div class="form-group" style="display:flex;flex-direction:column;gap:8px;">
            <label style="font-size:14px;font-weight:600;color:var(--gray-700);">Current Password</label>
            <input type="password" name="current_password" required placeholder="Enter your current password" style="padding:14px 16px;border:2px solid var(--gray-300);border-radius:12px;font-size:15px;font-family:inherit;color:var(--gray-900);outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--gray-300)'">
        </div>

        <div class="form-group" style="display:flex;flex-direction:column;gap:8px;">
            <label style="font-size:14px;font-weight:600;color:var(--gray-700);">New Password</label>
            <input type="password" name="new_password" required minlength="6" placeholder="Enter new password (min 6 characters)" style="padding:14px 16px;border:2px solid var(--gray-300);border-radius:12px;font-size:15px;font-family:inherit;color:var(--gray-900);outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--gray-300)'">
        </div>

        <div class="form-group" style="display:flex;flex-direction:column;gap:8px;">
            <label style="font-size:14px;font-weight:600;color:var(--gray-700);">Confirm New Password</label>
            <input type="password" name="confirm_password" required minlength="6" placeholder="Confirm your new password" style="padding:14px 16px;border:2px solid var(--gray-300);border-radius:12px;font-size:15px;font-family:inherit;color:var(--gray-900);outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--gray-300)'">
        </div>

        <button type="submit" style="padding:14px 24px;border:none;border-radius:12px;font-size:15px;font-weight:700;color:white;background:linear-gradient(135deg,var(--primary),var(--primary-dark));cursor:pointer;transition:all 0.3s;box-shadow:var(--shadow);" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">Update Password</button>
    </form>
</div>
{% endblock %}
